[build]
  command = "pnpm run build"
  publish = "dist"

[build.environment]
  # Install and build phases must share the same Puppeteer cache dir so the
  # prerender step (scripts/prerender.mjs) can find the Chromium downloaded at
  # install time. If Chromium is unavailable the prerender safely no-ops.
  PUPPETEER_CACHE_DIR = "/opt/build/repo/.cache/puppeteer"

[context.production.environment]
  NODE_VERSION = "20"

# Blog article URL canonicalization — read before re-adding any [[redirects]] here.
#
# Each article is prerendered as a directory index (dist/blog/:slug/index.html),
# which Netlify serves at BOTH /blog/:slug and /blog/:slug/ with a 200 (same as
# every other prerendered page, e.g. /exif-clean). Google is told which form to
# index by the <link rel="canonical"> tag — the no-slash form — matching sitemap.xml.
# This canonical-tag dedup is the site-wide pattern and indexes cleanly.
#
# Do NOT try to force a single URL with a trailing-slash 301 (as a previous commit
# did): Netlify's redirect engine IGNORES trailing slashes when matching, so
# `from = "/blog/:slug/"` also matches the no-slash request. With force = true it
# then 301s the no-slash URL to itself — an infinite loop that broke Google
# indexing (GSC "Redirect error"). Without force it never fires, because the static
# file takes precedence. A one-directional slash 301 is therefore impossible here;
# the canonical tag is the only correct lever.
#
# pretty_urls = false keeps Netlify from injecting its own trailing-slash redirects,
# so both forms stay a plain 200.
[build.processing]
  skip_processing = false

[build.processing.html]
  pretty_urls = false

# Static prerendered files (dist/**/index.html) are served automatically and
# take precedence over this SPA fallback, so crawlers get full HTML. This
# redirect only handles routes that were not prerendered.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
