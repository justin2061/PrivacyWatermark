    <!-- Netlify Forms 偵測用的隱藏表單：build 時被 Netlify 掃描以建立 "pro-waitlist"
         表單；實際送出由 React（ProUpsell）以 AJAX POST 到 "/" 完成。零後端收集
         Pro 候補 Email。若帳號未啟用 Netlify Forms，AJAX 會失敗但前端仍記錄 GA 事件。 -->
    <form name="pro-waitlist" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="email" name="email" />
      <input type="text" name="tool" />
      <input type="text" name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('SW registered: ', registration);
            })
            .catch((registrationError) => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
